<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familia Barbosa - 210 Realty Group Property Showcase</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDrJTe5Ogh7mBiW_Hrx28hMrUB0N3Ecqvs&libraries=geometry"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B549E;
            --primary-dark: #2c3e7f;
            --accent: #059669;
            --light-gray: #f3f4f6;
            --border-gray: #e5e7eb;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --opacity-40: rgba(0, 0, 0, 0.4);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Haboro Contrast', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: var(--text-dark);
            overflow: hidden;
        }

        /* Welcome Overlay */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            animation: fadeOut 5s ease-in-out forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; pointer-events: none; }
        }

        .welcome-content {
            text-align: center;
            color: white;
        }

        .welcome-logo {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .welcome-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .welcome-subtitle {
            font-size: 24px;
            opacity: 0.95;
        }

        /* Menu Mode */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            gap: 40px;
            opacity: 1;
            transition: opacity 0.3s ease;
            pointer-events: all;
        }

        .menu-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .menu-title {
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
        }

        .menu-buttons {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-button {
            background: white;
            color: var(--primary);
            border: none;
            padding: 20px 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .mode-button:hover {
            background: var(--light-gray);
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .mode-button:active {
            transform: scale(0.98);
        }

        /* Carousel Mode */
        .carousel-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 1500;
        }

        .carousel-view.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .carousel-nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--opacity-40);
            border: none;
            color: white;
            font-size: 48px;
            padding: 20px 30px;
            cursor: pointer;
            z-index: 1501;
            transition: background 0.3s ease;
            user-select: none;
        }

        .carousel-nav-button:hover {
            background: rgba(0, 0, 0, 0.6);
        }

        .carousel-nav-button.prev {
            left: 20px;
        }

        .carousel-nav-button.next {
            right: 20px;
        }

        .carousel-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 15px;
            z-index: 1502;
        }

        .carousel-menu-button {
            background: var(--opacity-40);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .carousel-menu-button:hover {
            background: rgba(0, 0, 0, 0.6);
        }

        .carousel-property-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            z-index: 1502;
            background: var(--opacity-40);
            padding: 15px 30px;
            border-radius: 8px;
        }

        .carousel-address {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .carousel-counter {
            font-size: 14px;
            opacity: 0.8;
        }

        /* Scrolling Mode */
        .scrolling-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 1500;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .scrolling-view.active {
            display: block;
        }

        .scrolling-header {
            position: sticky;
            top: 0;
            z-index: 1502;
            background: var(--opacity-40);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scrolling-menu-button {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .scrolling-menu-button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .scrolling-properties {
            padding: 0;
        }

        .scrolling-property {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            border-bottom: 1px solid #333;
        }

        .scrolling-property-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
        }

        .scrolling-property-overlay {
            position: relative;
            z-index: 1501;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .property-buttons {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 20px;
            z-index: 1502;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .property-button {
            background: var(--opacity-40);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .property-button:hover {
            background: rgba(0, 0, 0, 0.6);
        }

        .property-button:active {
            background: rgba(0, 0, 0, 0.7);
        }

        /* Details Panel */
        .details-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--opacity-40);
            color: white;
            padding: 30px;
            border-top: 2px solid var(--accent);
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1503;
            max-height: 50vh;
            overflow-y: auto;
        }

        .details-panel.visible {
            transform: translateY(0);
        }

        .details-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .details-content {
            font-size: 16px;
            line-height: 1.6;
        }

        .details-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* Map View */
        .map-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1504;
            display: none;
        }

        .map-panel.visible {
            display: flex;
            flex-direction: column;
        }

        .map-header {
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .map-close {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        #googleMap {
            flex: 1;
        }

        .map-marker-info {
            background: white;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .menu-buttons {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            .mode-button {
                min-width: 160px;
                padding: 15px 30px;
                font-size: 18px;
            }

            .carousel-nav-button {
                padding: 15px 20px;
                font-size: 36px;
            }

            .carousel-nav-button.prev {
                left: 10px;
            }

            .carousel-nav-button.next {
                right: 10px;
            }

            .welcome-title {
                font-size: 36px;
            }

            .menu-title {
                font-size: 36px;
                padding: 20px;
            }

            .property-buttons {
                bottom: 20px;
                gap: 15px;
            }

            .property-button {
                padding: 10px 18px;
                font-size: 14px;
            }

            .details-panel {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .carousel-controls {
                flex-direction: column;
                top: 10px;
                left: 10px;
                gap: 10px;
            }

            .carousel-menu-button {
                padding: 8px 12px;
                font-size: 12px;
            }

            .carousel-property-info {
                bottom: 60px;
                padding: 10px 20px;
            }

            .carousel-address {
                font-size: 14px;
            }

            .carousel-counter {
                font-size: 12px;
            }

            .property-buttons {
                bottom: 15px;
                gap: 10px;
            }

            .property-button {
                padding: 8px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Welcome Overlay -->
    <div class="welcome-overlay" id="welcomeOverlay">
        <div class="welcome-content">
            <div class="welcome-logo">🏠</div>
            <div class="welcome-title">Familia Barbosa</div>
            <div class="welcome-subtitle">210 Realty Group</div>
            <div class="welcome-subtitle" style="font-size: 18px; margin-top: 20px;">Premium Properties Showcase</div>
        </div>
    </div>

    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-title">Selecciona tu modo</div>
        <div class="menu-buttons">
            <button class="mode-button" onclick="startCarouselMode()">Carrusel →</button>
            <button class="mode-button" onclick="startScrollingMode()">Scrolling ↓</button>
        </div>
    </div>

    <!-- Carousel Mode -->
    <div class="carousel-view" id="carouselView">
        <div class="carousel-controls">
            <button class="carousel-menu-button" onclick="backToMenu()">← Menú</button>
        </div>
        <div class="carousel-container">
            <button class="carousel-nav-button prev" onclick="prevProperty()">❮</button>
            <div class="carousel-image-wrapper">
                <img class="carousel-image" id="carouselImage" src="" alt="Property">
            </div>
            <button class="carousel-nav-button next" onclick="nextProperty()">❯</button>
        </div>
        <div class="carousel-property-info">
            <div class="carousel-address" id="carouselAddress"></div>
            <div class="carousel-counter">
                <span id="carouselPropertyIndex">1</span> / <span id="carouselPropertyTotal">12</span>
            </div>
        </div>
    </div>

    <!-- Scrolling Mode -->
    <div class="scrolling-view" id="scrollingView">
        <div class="scrolling-header">
            <span style="font-size: 18px; font-weight: bold;">Propiedades</span>
            <button class="scrolling-menu-button" onclick="backToMenu()">Menú →</button>
        </div>
        <div class="scrolling-properties" id="scrollingProperties"></div>
        <div class="scrolling-property" id="mapSection" style="min-height: auto; padding: 40px 20px;">
            <div style="text-align: center; color: white;">
                <h3 style="margin-bottom: 20px;">Ver todas las propiedades en el mapa</h3>
                <button class="property-button" onclick="showAllPropertiesMap()">Abrir Mapa</button>
            </div>
        </div>
    </div>

    <!-- Details Panel -->
    <div class="details-panel" id="detailsPanel">
        <button class="details-close" onclick="hideDetails()">&times;</button>
        <div class="details-title" id="detailsTitle"></div>
        <div class="details-content" id="detailsContent"></div>
    </div>

    <!-- Map Panel -->
    <div class="map-panel" id="mapPanel">
        <div class="map-header">
            <span style="font-weight: bold;">Mapa de Propiedades</span>
            <button class="map-close" onclick="closeMap()">&times;</button>
        </div>
        <div id="googleMap" style="flex: 1;"></div>
    </div>

    <script>
        const properties = [
            {
                id: 1,
                address: "117 Farming Grv, Boerne TX 78006",
                folder: "117_Farming_Grv_Boerne",
                images: 44,
                lat: 29.8044,
                lng: -98.7598,
                beds: 4,
                baths: 3,
                sqft: 3800
            },
            {
                id: 2,
                address: "5226 Breeze Way, San Antonio TX 78249",
                folder: "5226_Breeze_Way_San_Antonio",
                images: 50,
                lat: 29.5826,
                lng: -98.5282,
                beds: 3,
                baths: 2,
                sqft: 2800
            },
            {
                id: 3,
                address: "24318 Canyon Row, San Antonio TX 78260",
                folder: "24318_Canyon_Row_San_Antonio",
                images: 43,
                lat: 29.5421,
                lng: -98.6205,
                beds: 4,
                baths: 3.5,
                sqft: 3400
            },
            {
                id: 4,
                address: "7110 Avignon Forest, San Antonio TX 78256",
                folder: "7110_Avignon_Forest_San_Antonio",
                images: 11,
                lat: 29.5645,
                lng: -98.5834,
                beds: 3,
                baths: 2.5,
                sqft: 2500
            },
            {
                id: 5,
                address: "7114 Avignon Forest, San Antonio TX 78256",
                folder: "7114_Avignon_Forest_San_Antonio",
                images: 3,
                lat: 29.5645,
                lng: -98.5838,
                beds: 3,
                baths: 2,
                sqft: 2400
            },
            {
                id: 6,
                address: "7118 Avignon Forest, San Antonio TX 78256",
                folder: "7118_Avignon_Forest_San_Antonio",
                images: 3,
                lat: 29.5645,
                lng: -98.5842,
                beds: 3,
                baths: 2,
                sqft: 2400
            },
            {
                id: 7,
                address: "7122 Avignon Forest, San Antonio TX 78256",
                folder: "7122_Avignon_Forest_San_Antonio",
                images: 3,
                lat: 29.5645,
                lng: -98.5846,
                beds: 3,
                baths: 2,
                sqft: 2400
            },
            {
                id: 8,
                address: "311 Canyon Path, San Antonio TX 78258",
                folder: "311_Canyon_Path_San_Antonio",
                images: 4,
                lat: 29.5512,
                lng: -98.6084,
                beds: 2,
                baths: 2,
                sqft: 1800
            },
            {
                id: 9,
                address: "315 Canyon Path, San Antonio TX 78258",
                folder: "315_Canyon_Path_San_Antonio",
                images: 4,
                lat: 29.5513,
                lng: -98.6088,
                beds: 2,
                baths: 2,
                sqft: 1800
            },
            {
                id: 10,
                address: "319 Canyon Path, San Antonio TX 78258",
                folder: "319_Canyon_Path_San_Antonio",
                images: 4,
                lat: 29.5514,
                lng: -98.6092,
                beds: 2,
                baths: 2,
                sqft: 1800
            },
            {
                id: 11,
                address: "23347 Grande Vista, San Antonio TX 78261",
                folder: "23347_Grande_Vista_San_Antonio",
                images: 2,
                lat: 29.4901,
                lng: -98.6234,
                beds: 3,
                baths: 2.5,
                sqft: 2200
            },
            {
                id: 12,
                address: "23358 Grande Vista, San Antonio TX 78261",
                folder: "23358_Grande_Vista_San_Antonio",
                images: 4,
                lat: 29.4902,
                lng: -98.6238,
                beds: 3,
                baths: 2,
                sqft: 2100
            }
        ];

        const basePath = '/public/';
        let currentMode = null;
        let currentPropertyIndex = 0;
        let currentImageIndex = 0;
        let currentImages = [];
        let map = null;
        let markers = [];
        let pressTimer = null;
        let isHoldingMap = false;

        // Hide menu after 5 seconds (triggered by welcome animation end)
        setTimeout(() => {
            document.getElementById('welcomeOverlay').addEventListener('animationend', () => {
                // Menu is shown by default
            }, { once: true });
        }, 5000);

        function startCarouselMode() {
            currentMode = 'carousel';
            currentPropertyIndex = 0;
            document.getElementById('menuOverlay').classList.add('hidden');
            document.getElementById('carouselView').classList.add('active');
            loadCarouselImages();
        }

        function startScrollingMode() {
            currentMode = 'scrolling';
            document.getElementById('menuOverlay').classList.add('hidden');
            document.getElementById('scrollingView').classList.add('active');
            buildScrollingView();
        }

        function backToMenu() {
            document.getElementById('carouselView').classList.remove('active');
            document.getElementById('scrollingView').classList.remove('active');
            hideDetails();
            currentMode = null;
            document.getElementById('menuOverlay').classList.remove('hidden');
        }

        // CAROUSEL MODE
        function loadCarouselImages() {
            const prop = properties[currentPropertyIndex];
            currentImages = [];
            for (let i = 1; i <= prop.images; i++) {
                const num = String(i).padStart(2, '0');
                currentImages.push(`${basePath}${prop.folder}/${prop.folder}_${num}.jpg`);
            }
            currentImageIndex = 0;
            showCarouselImage();
        }

        function showCarouselImage() {
            if (currentImages.length === 0) return;
            document.getElementById('carouselImage').src = currentImages[currentImageIndex];
            document.getElementById('carouselAddress').textContent = properties[currentPropertyIndex].address;
            document.getElementById('carouselPropertyIndex').textContent = currentPropertyIndex + 1;
            document.getElementById('carouselPropertyTotal').textContent = properties.length;
        }

        function nextProperty() {
            currentPropertyIndex = (currentPropertyIndex + 1) % properties.length;
            loadCarouselImages();
        }

        function prevProperty() {
            currentPropertyIndex = (currentPropertyIndex - 1 + properties.length) % properties.length;
            loadCarouselImages();
        }

        // SCROLLING MODE
        function buildScrollingView() {
            const container = document.getElementById('scrollingProperties');
            container.innerHTML = '';

            properties.forEach((prop, index) => {
                const propDiv = document.createElement('div');
                propDiv.className = 'scrolling-property';
                propDiv.id = `property-${prop.id}`;

                const imageUrl = `${basePath}${prop.folder}/${prop.folder}_01.jpg`;

                propDiv.innerHTML = `
                    <img class="scrolling-property-image" src="${imageUrl}" alt="${prop.address}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%221%22 height=%221%22%3E%3C/svg%3E'">
                    <div class="scrolling-property-overlay">
                        <div class="property-buttons">
                            <button class="property-button" onmousedown="startMapPress(event, ${prop.id})" onmouseup="endMapPress()" ontouchstart="startMapPress(event, ${prop.id})" ontouchend="endMapPress()" onmouseleave="endMapPress()">Mapa</button>
                            <button class="property-button" onmousedown="startDetailsPress(event, ${prop.id})" onmouseup="endDetailsPress()" ontouchstart="startDetailsPress(event, ${prop.id})" ontouchend="endDetailsPress()" onmouseleave="endDetailsPress()">Más detalles</button>
                        </div>
                    </div>
                `;

                container.appendChild(propDiv);
            });
        }

        // PRESS/HOLD HANDLERS
        function startMapPress(e, propId) {
            const prop = properties.find(p => p.id === propId);
            pressTimer = setTimeout(() => {
                isHoldingMap = true;
                showAllPropertiesMap();
            }, 4000);
            // Short press shows location snapshot
            setTimeout(() => {
                if (!isHoldingMap && pressTimer) {
                    showPropertyLocation(prop);
                }
            }, 100);
        }

        function endMapPress() {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
            isHoldingMap = false;
        }

        function startDetailsPress(e, propId) {
            const prop = properties.find(p => p.id === propId);
            pressTimer = setTimeout(() => {
                showDetails(prop);
            }, 100);
        }

        function endDetailsPress() {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
        }

        function showDetails(prop) {
            document.getElementById('detailsTitle').textContent = prop.address;
            document.getElementById('detailsContent').innerHTML = `
                <p><strong>Dormitorios:</strong> ${prop.beds}</p>
                <p><strong>Baños:</strong> ${prop.baths}</p>
                <p><strong>Área (sqft):</strong> ${prop.sqft.toLocaleString()}</p>
                <p><strong>Imágenes:</strong> ${prop.images}</p>
            `;
            document.getElementById('detailsPanel').classList.add('visible');
        }

        function hideDetails() {
            document.getElementById('detailsPanel').classList.remove('visible');
        }

        function showPropertyLocation(prop) {
            if (!map) {
                initMap();
            }
            map.setCenter({ lat: prop.lat, lng: prop.lng });
            map.setZoom(15);

            // Clear other markers
            markers.forEach(m => m.setMap(null));
            markers = [];

            // Add marker for this property
            const marker = new google.maps.Marker({
                position: { lat: prop.lat, lng: prop.lng },
                map: map,
                title: prop.address
            });
            markers.push(marker);

            document.getElementById('mapPanel').classList.add('visible');
            setTimeout(() => {
                document.getElementById('mapPanel').classList.remove('visible');
            }, 3000);
        }

        function showAllPropertiesMap() {
            if (!map) {
                initMap();
            }

            // Clear markers
            markers.forEach(m => m.setMap(null));
            markers = [];

            // Add markers for all properties
            properties.forEach(prop => {
                const marker = new google.maps.Marker({
                    position: { lat: prop.lat, lng: prop.lng },
                    map: map,
                    title: prop.address
                });
                markers.push(marker);
            });

            // Center map on all markers
            if (markers.length > 0) {
                const bounds = new google.maps.LatLngBounds();
                markers.forEach(marker => bounds.extend(marker.getPosition()));
                map.fitBounds(bounds);
            }

            document.getElementById('mapPanel').classList.add('visible');
        }

        function closeMap() {
            document.getElementById('mapPanel').classList.remove('visible');
        }

        function initMap() {
            const mapContainer = document.getElementById('googleMap');
            const center = { lat: 29.5, lng: -98.6 };
            map = new google.maps.Map(mapContainer, {
                zoom: 12,
                center: center,
                mapTypeControl: true,
                fullscreenControl: true
            });
        }

        // KEYBOARD NAVIGATION
        document.addEventListener('keydown', (e) => {
            if (!currentMode) return;

            if (currentMode === 'carousel') {
                if (e.key === 'ArrowRight') nextProperty();
                if (e.key === 'ArrowLeft') prevProperty();
            }

            if (e.key === 'Escape') {
                hideDetails();
                if (currentMode) backToMenu();
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            // Menu shown after welcome animation (5s)
        });
    </script>
</body>
</html>
