<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familia Barbosa - 210 Realty Group Property Showcase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #3B549E;
            --primary-dark: #2c3e7f;
            --accent: #059669;
            --light-gray: #f3f4f6;
            --text-dark: #1f2937;
            --overlay-bg: rgba(0,0,0,0.45);
        }

        html, body {
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000; color: var(--text-dark);
            overflow: hidden;
        }

        /* ── WELCOME ─────────────────────────────────────────────────── */
        #welcomeOverlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 3000;
            animation: fadeOut 5s ease-in-out forwards;
        }
        @keyframes fadeOut {
            0%,80% { opacity: 1; }
            100%    { opacity: 0; }
        }
        .welcome-content { text-align: center; color: white; }
        .welcome-logo    { font-size: 64px; margin-bottom: 20px; }
        .welcome-title   { font-size: 48px; font-weight: bold; margin-bottom: 15px; }
        .welcome-sub     { font-size: 24px; opacity: .95; }

        /* ── MENU ────────────────────────────────────────────────────── */
        #menuOverlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 2000; gap: 40px;
            transition: opacity .3s;
        }
        #menuOverlay.hidden { opacity: 0; pointer-events: none; }
        .menu-title { color: white; font-size: 48px; font-weight: bold; text-align: center; }
        .menu-buttons { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .mode-btn {
            background: white; color: var(--primary);
            border: none; padding: 20px 40px; border-radius: 12px;
            cursor: pointer; font-size: 20px; font-weight: bold;
            min-width: 200px; transition: all .3s;
        }
        .mode-btn:hover { background: var(--light-gray); transform: scale(1.05); }

        /* ── CAROUSEL ───────────────────────────────────────────────── */
        #carouselView {
            position: fixed; inset: 0;
            background: #000;
            display: none; z-index: 1500;
        }
        #carouselView.active { display: block; }

        /* Full-screen image */
        #carouselImage {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            cursor: pointer;   /* tap = next photo */
        }

        /* Left / Right property nav arrows */
        .c-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: var(--overlay-bg); border: none;
            color: white; font-size: 48px;
            padding: 20px 28px; cursor: pointer;
            z-index: 10; transition: background .2s;
            user-select: none; -webkit-user-select: none;
        }
        .c-arrow:hover  { background: rgba(0,0,0,.65); }
        .c-arrow.left   { left: 10px; }
        .c-arrow.right  { right: 10px; }

        /* Top-left back button */
        #carouselBack {
            position: absolute; top: 16px; left: 16px; z-index: 10;
            background: var(--overlay-bg); border: none; color: white;
            padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px;
        }

        /* Bottom info bar */
        #carouselInfo {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--overlay-bg); color: white;
            padding: 14px 20px; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; flex-wrap: wrap;
        }
        #carouselAddress { font-size: 16px; font-weight: bold; flex: 1; }
        #carouselCounter { font-size: 13px; opacity: .8; white-space: nowrap; }
        .carousel-action-btns { display: flex; gap: 10px; }
        .c-action-btn {
            background: white; color: var(--primary);
            border: none; padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: 600;
            user-select: none; -webkit-user-select: none;
        }

        /* ── SCROLLING ───────────────────────────────────────────────── */
        #scrollingView {
            position: fixed; inset: 0;
            background: #000; display: none;
            z-index: 1500; overflow-y: auto;
        }
        #scrollingView.active { display: block; }

        .scroll-header {
            position: sticky; top: 0; z-index: 10;
            background: var(--overlay-bg); color: white;
            padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .scroll-back-btn {
            background: transparent; border: 1px solid white;
            color: white; padding: 8px 14px; border-radius: 6px;
            cursor: pointer; font-size: 14px;
        }

        .scroll-property {
            position: relative; width: 100%; min-height: 100vh;
            display: flex; align-items: flex-end;
            border-bottom: 2px solid #222;
        }
        .scroll-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover;
        }
        .scroll-overlay {
            position: relative; z-index: 2;
            width: 100%; background: var(--overlay-bg);
            color: white; padding: 18px 20px;
        }
        .scroll-address { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
        .scroll-btns { display: flex; gap: 12px; flex-wrap: wrap; }
        .s-action-btn {
            background: white; color: var(--primary);
            border: none; padding: 10px 20px; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: 600;
            user-select: none; -webkit-user-select: none;
        }

        #mapSection {
            padding: 40px 20px; text-align: center; background: #111;
        }
        #mapSection h3 { color: white; margin-bottom: 20px; font-size: 18px; }
        #mapSection .s-action-btn { font-size: 16px; padding: 14px 28px; }

        /* ── DETAILS PANEL ──────────────────────────────────────────── */
        #detailsPanel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(20,20,20,.95); color: white;
            padding: 28px 24px 32px;
            border-top: 3px solid var(--accent);
            transform: translateY(100%);
            transition: transform .25s ease;
            z-index: 2500; max-height: 55vh; overflow-y: auto;
        }
        #detailsPanel.visible { transform: translateY(0); }
        .details-close {
            position: absolute; top: 14px; right: 18px;
            background: transparent; border: none; color: white;
            font-size: 26px; cursor: pointer; line-height: 1;
        }
        .details-title { font-size: 20px; font-weight: bold; margin-bottom: 14px; color: var(--accent); }
        .details-content { font-size: 15px; line-height: 1.7; }
        .details-content p { margin-bottom: 6px; }

        /* ── MAP PANEL ──────────────────────────────────────────────── */
        #mapPanel {
            position: fixed; inset: 0;
            background: white; z-index: 2600; display: none;
            flex-direction: column;
        }
        #mapPanel.visible { display: flex; }
        .map-header {
            background: var(--primary); color: white;
            padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold;
        }
        .map-close {
            background: transparent; border: none;
            color: white; font-size: 26px; cursor: pointer;
        }
        #googleMapFrame { flex: 1; border: 0; }

        /* ── 210 REALTY LOGO ────────────────────────────────────────── */
        .realty-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 8px;
            background: white;
            padding: 8px 12px;
        }

        /* ── RESPONSIVE ─────────────────────────────────────────────── */
        @media (max-width: 480px) {
            .welcome-title  { font-size: 36px; }
            .menu-title     { font-size: 32px; padding: 20px; }
            .mode-btn       { min-width: 160px; padding: 14px 24px; font-size: 17px; }
            .c-arrow        { font-size: 36px; padding: 14px 18px; }
            #carouselAddress { font-size: 14px; }
        }
    </style>
</head>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const properties = [
    { id:1,  address:"117 Farming Grv, Boerne TX 78006",             folder:"117_Farming_Grv_Boerne",           images:44, lat:29.8044,  lng:-98.7598, beds:4, baths:3,   sqft:3800 },
    { id:2,  address:"5226 Breeze Way, San Antonio TX 78249",         folder:"5226_Breeze_Way_San_Antonio",       images:50, lat:29.5826,  lng:-98.5282, beds:3, baths:2,   sqft:2800 },

    { id:4,  address:"7110 Avignon Forest, San Antonio TX 78256",     folder:"7110_Avignon_Forest_San_Antonio",  images:11, lat:29.5645,  lng:-98.5834, beds:3, baths:2.5, sqft:2500 },
    { id:5,  address:"7114 Avignon Forest, San Antonio TX 78256",     folder:"7114_Avignon_Forest_San_Antonio",  images:3,  lat:29.5645,  lng:-98.5838, beds:3, baths:2,   sqft:2400 },
    { id:6,  address:"7118 Avignon Forest, San Antonio TX 78256",     folder:"7118_Avignon_Forest_San_Antonio",  images:3,  lat:29.5645,  lng:-98.5842, beds:3, baths:2,   sqft:2400 },
    { id:7,  address:"7122 Avignon Forest, San Antonio TX 78256",     folder:"7122_Avignon_Forest_San_Antonio",  images:3,  lat:29.5645,  lng:-98.5846, beds:3, baths:2,   sqft:2400 },
    { id:8,  address:"311 Canyon Path, San Antonio TX 78258",         folder:"311_Canyon_Path_San_Antonio",      images:4,  lat:29.5512,  lng:-98.6084, beds:2, baths:2,   sqft:1800 },
    { id:9,  address:"315 Canyon Path, San Antonio TX 78258",         folder:"315_Canyon_Path_San_Antonio",      images:4,  lat:29.5513,  lng:-98.6088, beds:2, baths:2,   sqft:1800 },
    { id:10, address:"319 Canyon Path, San Antonio TX 78258",         folder:"319_Canyon_Path_San_Antonio",      images:4,  lat:29.5514,  lng:-98.6092, beds:2, baths:2,   sqft:1800 },
    { id:11, address:"23347 Grande Vista, San Antonio TX 78261",      folder:"23347_Grande_Vista_San_Antonio",   images:2,  lat:29.4901,  lng:-98.6234, beds:3, baths:2.5, sqft:2200 },
    { id:12, address:"23358 Grande Vista, San Antonio TX 78261",      folder:"23358_Grande_Vista_San_Antonio",   images:4,  lat:29.4902,  lng:-98.6238, beds:3, baths:2,   sqft:2100 }
];

const basePath = '/public/';
let currentMode = null;
let currentPropertyIndex = 0;
let currentImageIndex    = 0;
let currentImages        = [];
let mapAutoCloseTimer = null;

// ── WELCOME: remove overlay after animation so it never blocks clicks ─────────
setTimeout(() => {
    const el = document.getElementById('welcomeOverlay');
    if (el) el.style.display = 'none';
}, 5100);  // 5s animation + tiny buffer

// ── MODE SWITCHERS ────────────────────────────────────────────────────────────
function startCarouselMode() {
    currentMode = 'carousel';
    currentPropertyIndex = 0;
    currentImageIndex    = 0;
    document.getElementById('menuOverlay').classList.add('hidden');
    document.getElementById('carouselView').classList.add('active');
    loadCarouselImages();
}

function startScrollingMode() {
    currentMode = 'scrolling';
    document.getElementById('menuOverlay').classList.add('hidden');
    document.getElementById('scrollingView').classList.add('active');
    buildScrollingView();
}

function backToMenu() {
    document.getElementById('carouselView').classList.remove('active');
    document.getElementById('scrollingView').classList.remove('active');
    hideDetails();
    closeMap();
    currentMode = null;
    document.getElementById('menuOverlay').classList.remove('hidden');
}

// ── CAROUSEL ──────────────────────────────────────────────────────────────────
function loadCarouselImages() {
    const prop = properties[currentPropertyIndex];
    currentImages = [];
    for (let i = 1; i <= prop.images; i++) {
        const n = String(i).padStart(2, '0');
        currentImages.push(`${basePath}${prop.folder}/${prop.folder}_${n}.jpg`);
    }
    currentImageIndex = 0;
    renderCarouselImage();
}

function renderCarouselImage() {
    const prop = properties[currentPropertyIndex];
    document.getElementById('carouselImage').src = currentImages[currentImageIndex];
    document.getElementById('carouselAddress').textContent = prop.address;
    document.getElementById('carouselCounter').textContent =
        `Prop. ${currentPropertyIndex + 1}/${properties.length}  ·  Foto ${currentImageIndex + 1}/${currentImages.length}`;
}

function nextProperty() {
    currentPropertyIndex = (currentPropertyIndex + 1) % properties.length;
    loadCarouselImages();
}

function prevProperty() {
    currentPropertyIndex = (currentPropertyIndex - 1 + properties.length) % properties.length;
    loadCarouselImages();
}

// Tap on image → cycle photos within current property
function nextPhoto() {
    currentImageIndex = (currentImageIndex + 1) % currentImages.length;
    renderCarouselImage();
}

// ── CAROUSEL BUTTON SETUP (called once on DOMContentLoaded) ──────────────────
function setupCarouselButtons() {
    // MAPA — press = single property snapshot; hold 4 s = all properties
    attachPressHold(
        document.getElementById('cMapBtn'),
        // onPress:
        () => {
            const prop = properties[currentPropertyIndex];
            showPropertyMap(prop, /*singleProp*/ true);
        },
        // onHold (4 s):
        () => {
            cancelMapAutoClose();
            closeMap();
            showAllPropertiesMap();
        },
        // onRelease (after short press, auto-close after 3 s):
        (wasHeld) => {
            if (!wasHeld) {
                mapAutoCloseTimer = setTimeout(closeMap, 3000);
            }
        }
    );

    // DETALLES — hold = show, release = hide
    const detBtn = document.getElementById('cDetailsBtn');
    addPressRelease(
        detBtn,
        () => showDetails(properties[currentPropertyIndex]),
        () => hideDetails()
    );
}

// ── SCROLLING ─────────────────────────────────────────────────────────────────
function buildScrollingView() {
    const container = document.getElementById('scrollingProperties');
    container.innerHTML = '';

    properties.forEach(prop => {
        const div = document.createElement('div');
        div.className = 'scroll-property';
        div.id = `sp-${prop.id}`;

        const imgUrl = `${basePath}${prop.folder}/${prop.folder}_01.jpg`;
        div.innerHTML = `
            <img class="scroll-img" src="${imgUrl}" alt="${prop.address}"
                 onerror="this.style.opacity='0'">
            <div class="scroll-overlay">
                <div class="scroll-address">${prop.address}</div>
                <div class="scroll-btns">
                    <button class="s-action-btn" id="smap-${prop.id}">🗺 Mapa</button>
                    <button class="s-action-btn" id="sdet-${prop.id}">📋 Detalles</button>
                </div>
            </div>
        `;
        container.appendChild(div);

        // Wire up buttons after appending
        const mapBtn = div.querySelector(`#smap-${prop.id}`);
        const detBtn = div.querySelector(`#sdet-${prop.id}`);

        attachPressHold(
            mapBtn,
            () => showPropertyMap(prop, true),
            () => { cancelMapAutoClose(); closeMap(); showAllPropertiesMap(); },
            (wasHeld) => { if (!wasHeld) mapAutoCloseTimer = setTimeout(closeMap, 3000); }
        );

        addPressRelease(
            detBtn,
            () => showDetails(prop),
            () => hideDetails()
        );
    });
}

// ── PRESS / HOLD / RELEASE HELPERS ───────────────────────────────────────────
/**
 * Attach press-hold behavior to a button.
 * onPress fires immediately; onHold fires after holdMs; onRelease fires on up/leave.
 */
function attachPressHold(btn, onPress, onHold, onRelease, holdMs = 4000) {
    let timer = null;
    let held  = false;

    function start(e) {
        e.preventDefault();
        held = false;
        onPress();
        timer = setTimeout(() => { held = true; onHold(); }, holdMs);
    }
    function end(e) {
        if (timer) { clearTimeout(timer); timer = null; }
        onRelease(held);
        held = false;
    }

    btn.addEventListener('mousedown',  start);
    btn.addEventListener('touchstart', start, { passive: false });
    btn.addEventListener('mouseup',    end);
    btn.addEventListener('touchend',   end);
    btn.addEventListener('mouseleave', end);
}

/**
 * Show on press, hide on release.
 */
function addPressRelease(btn, onPress, onRelease) {
    function start(e) { e.preventDefault(); onPress(); }
    function end()    { onRelease(); }
    btn.addEventListener('mousedown',  start);
    btn.addEventListener('touchstart', start, { passive: false });
    btn.addEventListener('mouseup',    end);
    btn.addEventListener('touchend',   end);
    btn.addEventListener('mouseleave', end);
}

// ── DETAILS ──────────────────────────────────────────────────────────────────
function showDetails(prop) {
    document.getElementById('detailsTitle').textContent = prop.address;
    document.getElementById('detailsContent').innerHTML = `
        <p><strong>Dormitorios:</strong> ${prop.beds}</p>
        <p><strong>Baños:</strong> ${prop.baths}</p>
        <p><strong>Área:</strong> ${prop.sqft.toLocaleString()} sqft</p>
        <p><strong>Fotos disponibles:</strong> ${prop.images}</p>
    `;
    document.getElementById('detailsPanel').classList.add('visible');
}
function hideDetails() {
    document.getElementById('detailsPanel').classList.remove('visible');
}

// ── MAP ───────────────────────────────────────────────────────────────────────
function showPropertyMap(prop, isSingle) {
    const address = encodeURIComponent(prop.address + ', San Antonio, TX');
    document.getElementById('googleMapFrame').src =
        `https://maps.google.com/maps?q=${address}&output=embed&z=16`;
    document.getElementById('mapTitle').textContent = prop.address;
    document.getElementById('mapPanel').classList.add('visible');
}

function showAllPropertiesMap() {
    document.getElementById('googleMapFrame').src =
        `https://maps.google.com/maps?q=San+Antonio+TX&output=embed&z=11`;
    document.getElementById('mapTitle').textContent = 'Todas las propiedades';
    document.getElementById('mapPanel').classList.add('visible');
}

function closeMap() {
    cancelMapAutoClose();
    document.getElementById('mapPanel').classList.remove('visible');
}

function cancelMapAutoClose() {
    if (mapAutoCloseTimer) { clearTimeout(mapAutoCloseTimer); mapAutoCloseTimer = null; }
}

// ── SWIPE (carousel) ─────────────────────────────────────────────────────────
(function initSwipe() {
    let sx = 0, sy = 0;
    const view = document.getElementById('carouselView');

    view.addEventListener('touchstart', e => {
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
    }, { passive: true });

    view.addEventListener('touchend', e => {
        if (currentMode !== 'carousel') return;
        const dx = e.changedTouches[0].clientX - sx;
        const dy = e.changedTouches[0].clientY - sy;
        // Ignore if touch originated on a button
        if (e.target.closest('button')) return;
        // Horizontal swipe threshold
        if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
            dx < 0 ? nextProperty() : prevProperty();
        }
        // Pure tap (very little movement) is handled by the img onclick → nextPhoto()
    }, { passive: true });
})();

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (currentMode === 'carousel') {
        if (e.key === 'ArrowRight') nextProperty();
        if (e.key === 'ArrowLeft')  prevProperty();
        if (e.key === ' ' || e.key === 'ArrowDown') nextPhoto();
    }
    if (e.key === 'Escape') {
        if (document.getElementById('mapPanel').classList.contains('visible')) closeMap();
        else if (document.getElementById('detailsPanel').classList.contains('visible')) hideDetails();
        else if (currentMode) backToMenu();
    }
});

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', setupCarouselButtons);
</script>
